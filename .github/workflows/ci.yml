name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx psutil
      - name: Lint with Ruff
        run: |
          pip install ruff
          cd backend
          ruff check app/ || true
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --ignore=tests/test_cache.py -x
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET_KEY: "test-secret-key-for-ci"

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true
      - name: Lint
        run: |
          cd frontend
          npx eslint src/ || true

  build-docker:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: |
          cd backend
          docker build -t godeyes-backend:test .
      - name: Build frontend image
        run: |
          cd frontend
          docker build -t godeyes-frontend:test .
