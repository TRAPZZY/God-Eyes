services:
  - type: web
    name: godeyes-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: godeyes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: godeyes-redis
          property: connectionString
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"

  - type: web
    name: godeyes-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: godeyes-backend
          property: host
      - key: VITE_MAPBOX_TOKEN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: godeyes-redis
    ipAllowList: []

databases:
  - name: godeyes-db
    databaseName: godeyes
