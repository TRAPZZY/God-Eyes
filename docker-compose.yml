version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: godeyes-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-godeyes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godeyes_secure_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-godeyes}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godeyes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: godeyes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: godeyes-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-godeyes}:${POSTGRES_PASSWORD:-godeyes_secure_password_2024}@postgres:5432/${POSTGRES_DB:-godeyes}
      REDIS_URL: redis://redis:6379/0
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      MAPBOX_SECRET_TOKEN: ${MAPBOX_SECRET_TOKEN}
      SENTINEL_HUB_CLIENT_ID: ${SENTINEL_HUB_CLIENT_ID}
      SENTINEL_HUB_CLIENT_SECRET: ${SENTINEL_HUB_CLIENT_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: godeyes-celery
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-godeyes}:${POSTGRES_PASSWORD:-godeyes_secure_password_2024}@postgres:5432/${POSTGRES_DB:-godeyes}
      REDIS_URL: redis://redis:6379/0
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      MAPBOX_SECRET_TOKEN: ${MAPBOX_SECRET_TOKEN}
      SENTINEL_HUB_CLIENT_ID: ${SENTINEL_HUB_CLIENT_ID}
      SENTINEL_HUB_CLIENT_SECRET: ${SENTINEL_HUB_CLIENT_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
      - backend

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: godeyes-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-godeyes}:${POSTGRES_PASSWORD:-godeyes_secure_password_2024}@postgres:5432/${POSTGRES_DB:-godeyes}
      REDIS_URL: redis://redis:6379/0
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      SENTINEL_HUB_CLIENT_ID: ${SENTINEL_HUB_CLIENT_ID}
      SENTINEL_HUB_CLIENT_SECRET: ${SENTINEL_HUB_CLIENT_SECRET}
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
      - celery_worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: godeyes-frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MAPBOX_TOKEN: ${MAPBOX_ACCESS_TOKEN}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
